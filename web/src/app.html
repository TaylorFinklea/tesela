<!doctype html>
<html lang="en" class="dark h-full antialiased">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		%sveltekit.head%
		<script>
			// Apply theme before first paint to prevent flash
			(function() {
				var id = localStorage.getItem('tesela:theme-id') || 'tesela';
				// Inline the default theme vars so CSS works before Svelte mounts
				var defaults = {
					'--background': 'oklch(0.10 0.008 280)', '--foreground': 'oklch(0.88 0.01 280)',
					'--surface': 'oklch(0.085 0.01 280)', '--surface-2': 'oklch(0.12 0.012 280)',
					'--muted': 'oklch(0.16 0.012 280)', '--muted-foreground': 'oklch(0.62 0.01 280)',
					'--accent': 'oklch(0.14 0.015 280)', '--accent-foreground': 'oklch(0.85 0.01 280)',
					'--primary': 'oklch(0.78 0.14 75)', '--primary-foreground': 'oklch(0.12 0 0)',
					'--destructive': 'oklch(0.62 0.20 25)', '--border': 'oklch(1 0 0 / 5%)',
					'--ring': 'oklch(0.78 0.14 75)', '--popover': 'oklch(0.12 0.012 280)',
					'--popover-foreground': 'oklch(0.88 0.01 280)',
					'--block-bg': 'oklch(0.12 0.012 280)', '--block-border': 'oklch(1 0 0 / 4%)',
					'--block-radius': '10px', '--block-shadow': '0 2px 8px -2px oklch(0 0 0 / 20%)',
					'--focus-glow': '0 0 12px -3px oklch(0.78 0.14 75 / 20%)', '--thread-border': 'oklch(1 0 0 / 4%)'
				};
				for (var k in defaults) document.documentElement.style.setProperty(k, defaults[k]);
				document.documentElement.setAttribute('data-theme', id);
			})();
		</script>
	</head>
	<body class="min-h-full flex flex-col bg-background text-foreground" data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
