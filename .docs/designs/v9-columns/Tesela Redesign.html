<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tesela Redesign — Directions</title>
<style>
  html, body, #canvas-root { height: 100%; margin: 0; }
  body { background: #0d0c10; font-family: ui-sans-serif, system-ui, sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="canvas-root"></div>
<script type="text/babel" src="./design-canvas.jsx"></script>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

const frame = { width: "100%", height: "100%", border: "none", display: "block" };

function App() {
  return (
    <DesignCanvas
      title="Tesela — Outliner Redesign"
      subtitle="v3 sets the visual baseline. v4 and v5 explore divergent UX models on top of it."
    >
      <DCSection id="baseline" title="Baseline — bullet outliner, refined">
        <DCArtboard id="v3" label="v3 — Editorial (warm paper, the chosen visual direction)" width={1440} height={900}>
          <iframe src="./v3/Tesela v3 - Editorial.html" style={frame} title="v3"/>
        </DCArtboard>
      </DCSection>

      <DCSection id="divergent" title="Divergent UX — what if the metaphor changed?">
        <DCArtboard id="v4" label="v4 — The Mosaic · spatial canvas, indent = containment" width={1440} height={900}>
          <iframe src="./v4/Tesela v4 - Mosaic Spatial.html" style={frame} title="v4"/>
        </DCArtboard>
        <DCArtboard id="v5" label="v5 — The Workbench · type is primary, daily demoted to scratchpad" width={1440} height={900}>
          <iframe src="./v5/Tesela v5 - Workbench Type-Driven.html" style={frame} title="v5"/>
        </DCArtboard>
      </DCSection>

      <DCSection id="earlier" title="Earlier explorations">
        <DCArtboard id="v1" label="v1 — Refined (warm, lamplit)" width={1280} height={820}>
          <iframe src="./v1/Tesela Redesign.html" style={frame} title="v1"/>
        </DCArtboard>
        <DCArtboard id="v2" label="v2 — Bold Mosaic (terminal, type-coded)" width={1280} height={820}>
          <iframe src="./v2/Tesela v2 - Mosaic.html" style={frame} title="v2"/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("canvas-root")).render(<App />);
</script>
</body>
</html>
