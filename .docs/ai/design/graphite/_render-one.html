<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>render one</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>html,body{margin:0;background:#0E1014;} #root{position:relative;width:1380px;height:860px;}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="directions/icons.jsx"></script>
<script type="text/babel" src="directions/shared.jsx"></script>
<script type="text/babel" src="graphite/gr-shell.jsx"></script>
<script type="text/babel" src="graphite/gr-core.jsx"></script>
<script type="text/babel" src="graphite/gr-overlays.jsx"></script>
<script type="text/babel" src="graphite/gr-pages.jsx"></script>
<script type="text/babel" data-presets="react">
  const params = new URLSearchParams(location.search);
  const name = params.get('screen') || 'ScreenInbox';
  const Comp = window[name];
  ReactDOM.createRoot(document.getElementById('root')).render(
    Comp ? <Comp /> : <div style={{color:'#fff',padding:20}}>Unknown screen: {name}</div>
  );
</script>
</body>
</html>
