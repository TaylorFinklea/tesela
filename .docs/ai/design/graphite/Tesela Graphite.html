<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tesela — Graphite</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#0E1014"/>
    <g transform="translate(30 30)">
      <rect x="0" y="0" width="11" height="11" rx="2" fill="#8693B2"/>
      <rect x="14.5" y="0" width="11" height="11" rx="2" fill="#FF6B5A"/>
      <rect x="29" y="0" width="11" height="11" rx="2" fill="#8693B2"/>
      <rect x="14.5" y="14.5" width="11" height="11" rx="2" fill="#8693B2"/>
      <rect x="14.5" y="29" width="11" height="11" rx="2" fill="#8693B2"/>
    </g>
  </svg>
</template>
<style>
  html, body { margin: 0; background: #0E1014; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="directions/icons.jsx"></script>
<script type="text/babel" src="directions/shared.jsx"></script>
<script type="text/babel" src="graphite/gr-shell.jsx"></script>
<script type="text/babel" src="graphite/gr-core.jsx"></script>
<script type="text/babel" src="graphite/gr-overlays.jsx"></script>
<script type="text/babel" src="graphite/gr-pages.jsx"></script>

<script type="text/babel" data-presets="react">
  const W = 1380, H = 860;

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="workspace" title="Graphite · Workspace" subtitle="The everyday surfaces. Contrast lifted across widget headers, pinned rows & metadata. Click any board to focus.">
          <DCArtboard id="project" label="Project focus — outliner + linked references" width={W} height={H}><ScreenProject /></DCArtboard>
          <DCArtboard id="daily" label="Daily — journal" width={W} height={H}><ScreenDaily /></DCArtboard>
          <DCArtboard id="inbox" label="Inbox — capture triage" width={W} height={H}><ScreenInbox /></DCArtboard>
          <DCArtboard id="agenda" label="Agenda — week" width={W} height={H}><ScreenAgenda /></DCArtboard>
        </DCSection>

        <DCSection id="keyboard" title="Graphite · Keyboard surfaces" subtitle="The keyboard-first moments — command palette, leader chords, graph.">
          <DCArtboard id="command" label="Command Station — ⌘K" width={W} height={H}><ScreenCommand /></DCArtboard>
          <DCArtboard id="leader" label="Leader chord menu — Space" width={W} height={H}><ScreenLeader /></DCArtboard>
          <DCArtboard id="graph" label="Graph — ⌘G fullscreen" width={W} height={H}><ScreenGraph /></DCArtboard>
        </DCSection>

        <DCSection id="pages" title="Graphite · Pages & system" subtitle="Type system + settings.">
          <DCArtboard id="tag" label="Tag page — #Task schema + tagged blocks" width={W} height={H}><ScreenTagPage /></DCArtboard>
          <DCArtboard id="settings" label="Settings — Sync" width={W} height={H}><ScreenSettings /></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
