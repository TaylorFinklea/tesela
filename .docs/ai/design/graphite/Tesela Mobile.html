<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tesela — Mobile (Graphite)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#0E1014"/>
    <g transform="translate(30 30)">
      <rect x="0" y="0" width="11" height="11" rx="2" fill="#8693B2"/>
      <rect x="14.5" y="0" width="11" height="11" rx="2" fill="#FF6B5A"/>
      <rect x="29" y="0" width="11" height="11" rx="2" fill="#8693B2"/>
      <rect x="14.5" y="14.5" width="11" height="11" rx="2" fill="#8693B2"/>
      <rect x="14.5" y="29" width="11" height="11" rx="2" fill="#8693B2"/>
    </g>
  </svg>
</template>
<style>
  html, body { margin: 0; background: #0E1014; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="directions/icons.jsx"></script>
<script type="text/babel" src="directions/shared.jsx"></script>
<script type="text/babel" src="mobile/grm-shell.jsx"></script>
<script type="text/babel" src="mobile/grm-phone.jsx"></script>
<script type="text/babel" src="mobile/grm-watch.jsx"></script>

<script type="text/babel" data-presets="react">
  const PW = 414, PH = 868;   // phone artboard
  const WW = 248, WH = 270;   // watch artboard

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="iphone" title="iPhone · Graphite" subtitle="iOS 26 Liquid-Glass tab bar (Daily · Agenda · Inbox · Library + Search). Capture is a sheet; Library is a workspace widget grid. Same palette, contrast & Tabler icons as desktop.">
          <DCArtboard id="p-daily" label="Daily — journal" width={PW} height={PH}><PhoneDaily /></DCArtboard>
          <DCArtboard id="p-agenda" label="Agenda — day" width={PW} height={PH}><PhoneAgenda /></DCArtboard>
          <DCArtboard id="p-inbox" label="Inbox — triage" width={PW} height={PH}><PhoneInbox /></DCArtboard>
          <DCArtboard id="p-library" label="Library — workspace widgets" width={PW} height={PH}><PhoneLibrary /></DCArtboard>
          <DCArtboard id="p-page" label="Page — project outliner" width={PW} height={PH}><PhonePage /></DCArtboard>
          <DCArtboard id="p-capture" label="Capture — voice + compose sheet" width={PW} height={PH}><PhoneCapture /></DCArtboard>
        </DCSection>

        <DCSection id="watch" title="Apple Watch · Graphite" subtitle="Net-new. The watch glances + captures. Parakeet can't run on-watch, so capture defers to native watchOS Dictation / Scribble / keyboard, then syncs. Same coral accent, mono metadata, Tabler glyphs.">
          <DCArtboard id="w-today" label="Today — glance" width={WW} height={WH}><WatchToday /></DCArtboard>
          <DCArtboard id="w-capture" label="Capture — native input" width={WW} height={WH}><WatchCapture /></DCArtboard>
          <DCArtboard id="w-tasks" label="Tasks" width={WW} height={WH}><WatchTasks /></DCArtboard>
          <DCArtboard id="w-agenda" label="Up next" width={WW} height={WH}><WatchAgenda /></DCArtboard>
        </DCSection>

        <DCSection id="complications" title="Apple Watch · Complications" subtitle="Watch-face surfaces — the mosaic mark + a coral progress arc carry the brand at a glance.">
          <DCArtboard id="w-comps" label="Complication treatments" width={560} height={150}><WatchComplications /></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
