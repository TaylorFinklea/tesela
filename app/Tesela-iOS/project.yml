name: Tesela-iOS

options:
  bundleIdPrefix: app.tesela
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    # Xcode 26 introduced explicit module builds (-explicit-module-build) which
    # pre-scans all Clang module dependencies at plan time. The tesela_sync_ffiFFI
    # module (from the Rust/UniFFI CFFI layer) uses a non-standard module-map name
    # (module.modulemap inside $(SRCROOT)/CFFI) that the explicit-module scanner
    # fails to resolve, even though SWIFT_INCLUDE_PATHS includes that directory and
    # implicit builds (Xcode 15 style) find it fine. Disabling explicit modules
    # restores the Xcode 15 implicit-module behaviour until the CFFI layout can be
    # restructured to satisfy the Xcode 26 scanner.
    SWIFT_ENABLE_EXPLICIT_MODULES: "NO"

# Phase 29 — Whisper.cpp via Swift Package Manager so iOS can run
# transcription on-device without a server round-trip. SwiftWhisper
# wraps the whisper.cpp C++ source and adds Accelerate + CoreML
# acceleration when available.
packages:
  SwiftWhisper:
    url: https://github.com/exPHAT/SwiftWhisper
    branch: master
  # FluidAudio — on-device Parakeet (NVIDIA TDT) ASR via CoreML.
  # Downloads + caches its own model set; see TranscriptionEngine.
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    branch: main

targets:
  TeselaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Tesela
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Tesela.app/Tesela
        PRODUCT_BUNDLE_IDENTIFIER: app.tesela.ios.tests
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_IDENTITY[sdk=iphonesimulator*]: "-"
        CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]: "NO"
        CODE_SIGN_IDENTITY[sdk=iphoneos*]: "Apple Development"
        CODE_SIGN_STYLE: "Automatic"
        DEVELOPMENT_TEAM: "K7CBQW6MPG"

  Tesela:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Generated
    dependencies:
      - package: SwiftWhisper
        product: SwiftWhisper
      - package: FluidAudio
        product: FluidAudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.tesela.ios
        # App icon — Sources/Assets.xcassets/AppIcon.appiconset (the new
        # Tesela logo). Assets.xcassets is picked up via the `Sources`
        # source path; this names which icon set the build uses.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/CFFI"
        HEADER_SEARCH_PATHS: "$(SRCROOT)/CFFI"
        # Reference the static archive (.a) by explicit path. The Rust FFI
        # crate produces both libtesela_sync_ffi.a and .dylib (the dylib is for
        # host-side bindings tests). Using `-l<name>` plus a search path lets
        # ld pick the dylib, which embeds an absolute dev-machine install-name
        # — fine for the simulator, but dyld can't resolve that path on a
        # physical device, causing __abort_with_payload at launch. An explicit
        # .a path forces static linking on both SDKs.
        OTHER_LDFLAGS[sdk=iphonesimulator*]: "$(SRCROOT)/../../target/aarch64-apple-ios-sim/release/libtesela_sync_ffi.a"
        OTHER_LDFLAGS[sdk=iphoneos*]: "$(SRCROOT)/../../target/aarch64-apple-ios/release/libtesela_sync_ffi.a"
        # Only build arm64. We cross-compile tesela-sync-ffi for
        # aarch64-apple-ios{,-sim} but not x86_64-apple-ios — Apple
        # Silicon simulators don't need it. If we ever support Intel
        # Macs, add a `cargo build --target x86_64-apple-ios` rule and
        # an XCFramework wrapper.
        ARCHS: "arm64"
        EXCLUDED_ARCHS: "x86_64"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        # SDK-conditional signing:
        # - Simulator: ad-hoc (the system stub identity); no team
        #   needed; allows `xcrun simctl install`.
        # - Device: automatic with the personal Apple Development
        #   team. DEVELOPMENT_TEAM must be the team ID that owns the
        #   provisioning profile (K7CBQW6MPG). The Apple ID suffix
        #   that appears in the cert CN (N8SUK4L228 from
        #   taylor.finklea@icloud.com) is not the team ID — that's
        #   the per-Apple-ID developer team that the cert was issued
        #   *for*, but the actual team membership and signing happen
        #   against K7CBQW6MPG. Mismatching the two causes a "Provisioning
        #   profile belongs to team X, which does not match the selected
        #   team Y" error at build time.
        CODE_SIGN_IDENTITY[sdk=iphonesimulator*]: "-"
        CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]: "NO"
        CODE_SIGN_IDENTITY[sdk=iphoneos*]: "Apple Development"
        CODE_SIGN_STYLE: "Automatic"
        DEVELOPMENT_TEAM: "K7CBQW6MPG"
        # APNs entitlement (sync durability P3) — DEVICE builds only, so the
        # ad-hoc simulator build never needs a managed profile. Requires the
        # "Push Notifications" capability ENABLED for App ID app.tesela.ios in
        # the Apple Developer portal; with automatic signing the managed
        # profile then grants aps-environment. If Push is NOT enabled, the
        # device archive fails with a provisioning error.
        CODE_SIGN_ENTITLEMENTS[sdk=iphoneos*]: "Tesela.entitlements"
        TARGETED_DEVICE_FAMILY: "1,2"
    scheme:
      testTargets:
        - TeselaTests
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Tesela
        # Version scheme (Taylor, 2026-06-10): plain build counter, no
        # timestamps. project.yml is the SOURCE OF TRUTH (xcodegen
        # regenerates Info.plist, so plist-only stamps get reset) —
        # scripts/ios-testflight.sh increments CFBundleVersion here AND in
        # the generated plist each release; commit project.yml post-upload.
        # 1.1 reset: 1.0's builds were timestamps and Apple requires
        # ascending builds within a version. Marketing-version bumps stay
        # MANUAL + rare.
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "73"
        # Export compliance: the app uses only STANDARD, published crypto
        # (ChaCha20-Poly1305 sync E2E + HKDF/HMAC-SHA256 + rustls TLS), which is
        # EXEMPT (EAR 740.17 standard-cryptography). Declaring this here stops
        # App Store Connect asking the encryption question on every upload. See
        # decisions.md 2026-06-08 "App Store export compliance". ⚠ PUBLIC release
        # still requires excluding France + the BIS self-classification report.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Dev-mode ATS relaxation so the iOS app can hit the
        # plaintext-HTTP tesela-server over loopback (simulator),
        # LAN (192.168/10/172.16), and Tailscale (100.64/10 CGNAT).
        #
        # IMPORTANT — only set NSAllowsArbitraryLoads. Setting
        # NSAllowsLocalNetworking together with it actually NARROWS
        # arbitrary loads to local-networking IP ranges only, which
        # blocks Tailscale's 100.64/10 CGNAT addresses with error -1022.
        # Single-key is correct here.
        #
        # Tighten this to NSExceptionDomains before any App Store
        # submission.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        # Phase 27 — voice capture. The mic button in the capture
        # sheet records to a WAV file that's uploaded to the
        # tesela-server's /transcription/transcribe endpoint.
        NSMicrophoneUsageDescription: "Tesela uses the microphone for voice notes — recordings are transcribed and saved to today's daily, then discarded."
        # Pair-via-QR. The Settings → Devices → Pair flow opens a
        # camera view to scan a pairing QR shown on another device.
        # The frames never leave the device and aren't stored.
        NSCameraUsageDescription: "Tesela uses the camera only to scan a pairing QR code from another device. Frames are decoded on-device and not stored."
        # Sync-durability Phase 2a — a BGProcessingTask wakes the
        # suspended app to drain the relay (deliver a stranded
        # capture + pull peers' edits) without a foreground launch.
        # The identifier MUST match the BGTaskScheduler.register()
        # call + BGProcessingTaskRequest in TeselaApp.swift, and
        # must also be listed in BGTaskSchedulerPermittedIdentifiers
        # (iOS drops any submit() to a non-listed identifier at
        # runtime, with no log on the device).
        UIBackgroundModes:
          - processing
          # Phase 3a — the relay server will send silent
          # `content-available: 1` pushes to wake a suspended device
          # when a new batch lands for the group; the iOS side runs
          # `RelayTicker.runBackgroundCatchup()` in response. Without
          # this entry iOS drops the wake entirely (no error, no log
          # on the device). Enabling Push for the App ID
          # (`aps-environment` entitlement) is the SEPARATE step that
          # makes the silent push actually arrive at runtime — out of
          # scope here.
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - app.tesela.ios.relay-catchup
