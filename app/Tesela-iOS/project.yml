name: Tesela-iOS

options:
  bundleIdPrefix: app.tesela
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"

# Phase 29 — Whisper.cpp via Swift Package Manager so iOS can run
# transcription on-device without a server round-trip. SwiftWhisper
# wraps the whisper.cpp C++ source and adds Accelerate + CoreML
# acceleration when available.
packages:
  SwiftWhisper:
    url: https://github.com/exPHAT/SwiftWhisper
    branch: master

targets:
  Tesela:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Generated
    dependencies:
      - package: SwiftWhisper
        product: SwiftWhisper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.tesela.ios
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/CFFI"
        HEADER_SEARCH_PATHS: "$(SRCROOT)/CFFI"
        OTHER_LDFLAGS: "-ltesela_sync_ffi"
        LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]: "$(SRCROOT)/../../target/aarch64-apple-ios-sim/release"
        LIBRARY_SEARCH_PATHS[sdk=iphoneos*]: "$(SRCROOT)/../../target/aarch64-apple-ios/release"
        # Only build arm64. We cross-compile tesela-sync-ffi for
        # aarch64-apple-ios{,-sim} but not x86_64-apple-ios — Apple
        # Silicon simulators don't need it. If we ever support Intel
        # Macs, add a `cargo build --target x86_64-apple-ios` rule and
        # an XCFramework wrapper.
        ARCHS: "arm64"
        EXCLUDED_ARCHS: "x86_64"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        # SDK-conditional signing:
        # - Simulator: ad-hoc (the system stub identity); no team
        #   needed; allows `xcrun simctl install`.
        # - Device: automatic with the personal Apple Development
        #   team (N8SUK4L228 = taylor.finklea@icloud.com). Xcode
        #   creates / refreshes the provisioning profile on demand
        #   when xcodebuild is invoked with -allowProvisioningUpdates.
        CODE_SIGN_IDENTITY[sdk=iphonesimulator*]: "-"
        CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]: "NO"
        CODE_SIGN_IDENTITY[sdk=iphoneos*]: "Apple Development"
        CODE_SIGN_STYLE: "Automatic"
        DEVELOPMENT_TEAM: "N8SUK4L228"
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Tesela
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Dev-mode ATS relaxation so the iOS app can hit the
        # plaintext-HTTP tesela-server over loopback (simulator),
        # LAN (192.168/10/172.16), and Tailscale (100.64/10 CGNAT).
        #
        # IMPORTANT — only set NSAllowsArbitraryLoads. Setting
        # NSAllowsLocalNetworking together with it actually NARROWS
        # arbitrary loads to local-networking IP ranges only, which
        # blocks Tailscale's 100.64/10 CGNAT addresses with error -1022.
        # Single-key is correct here.
        #
        # Tighten this to NSExceptionDomains before any App Store
        # submission.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        # Phase 27 — voice capture. The mic button in the capture
        # sheet records to a WAV file that's uploaded to the
        # tesela-server's /transcription/transcribe endpoint.
        NSMicrophoneUsageDescription: "Tesela uses the microphone for voice notes — recordings are transcribed and saved to today's daily, then discarded."
