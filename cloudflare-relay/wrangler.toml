name = "tesela-relay"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# Per-group Durable Object — each `group_id` gets its own DO instance
# (sticky to one edge location), giving us serialized state per group
# without a separate database. Built-in SQLite storage covers
# registrations + ops + device-seen.
[[durable_objects.bindings]]
name = "GROUP_DO"
class_name = "GroupDO"

# Single global Durable Object holding the disc -> group_id discovery
# index (recovery-phrase discovery, ra7 P0 step 2b). Addressed via
# `idFromName("global")` from both the Worker (/discover route) and
# GroupDO (register-time upsert) — see src/discovery-do.ts.
[[durable_objects.bindings]]
name = "DISCOVERY_DO"
class_name = "DiscoveryIndexDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GroupDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["DiscoveryIndexDO"]

# Admin token — set with `wrangler secret put TESELA_RELAY_ADMIN_TOKEN`.
# Used to gate `DELETE /admin/groups/:id/register` for hijack recovery.
# Do NOT commit the value.

# Optional knobs
[vars]
# 16 MiB per request. Taylor's real mosaic has single-note Loro snapshots
# up to ~7 MiB (the ai-business note), which blew past the old 1 MiB
# default with `413 Payload Too Large` on put_envelope — the exact relay-
# 413 jam the Rust self-host was already bumped to 16 MiB to fix. The CF
# Worker MUST match or it rejects every large deposit (and the failed tick
# never reaches APNs token registration, so pushes silently never start).
TESELA_RELAY_MAX_BODY = "16777216"
TESELA_RELAY_REPLAY_WINDOW_SECS = "300"  # ±5 min for X-Tesela-Ts

# TESELA_RELAY_ADMIN_TOKEN is NOT set here (no secrets in git). For a
# real deploy: `wrangler secret put TESELA_RELAY_ADMIN_TOKEN`. For local
# `wrangler dev` + the conformance suite it's read from `.dev.vars`
# (gitignored) — see that file.
