name: CI

# Fast PR/push-blocking lane. Three parallel jobs:
#   rust               — fmt gate, clippy (advisory), cargo test --workspace
#   web                — svelte-check (advisory), node:test unit suites (blocking)
#   worker-conformance — the relay conformance suite against the CF Worker
#                        via `wrangler dev` (the Rust relay impl is covered by
#                        `cargo test --workspace` in the rust job, so both
#                        relay implementations gate every push)
# A final notify job files/refreshes a GitHub issue when a main push goes red,
# so a red pipeline can never rot silently again (relay-container was dark
# 2026-05-29 → 06-08; ci.yml itself was red 2026-04-14 → 06-10).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (fmt, clippy, workspace tests)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # src-tauri (tesela-desktop) is a workspace member; Tauri v2 on Linux
      # needs the webkit2gtk/gtk system dev libs to compile. This is the
      # documented Tauri v2 Ubuntu prerequisite list (build-essential, curl,
      # wget, file, libssl-dev are preinstalled on ubuntu-latest).
      - name: Install Tauri v2 Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      # Advisory only: the workspace carries ~26 pre-existing clippy warnings
      # (tesela-core, tesela-sync, tesela-relay, tesela-sync-ffi,
      # tesela-server, tesela-loro-spike as of 2026-06-10). Promote to a
      # blocking `-D warnings` gate once those are burned down — do NOT gate
      # before then, or CI goes permanently red again like the fmt step did.
      - name: Clippy (advisory)
        continue-on-error: true
        run: cargo clippy --workspace

      - name: Tests
        run: cargo test --workspace

  web:
    name: Web (svelte-check, unit tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # Node 24 (LTS): the unit suites import .ts modules and need
      # --experimental-transform-types (TS parameter properties); node 26
      # dropped that flag, so pin 24.
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        run: pnpm --dir web install --frozen-lockfile

      # Advisory only: one pre-existing type error in
      # src/lib/components/v4/VoiceCaptureButton.svelte:169 (v4 chrome —
      # slated for deletion in the Graphite cutover, stream B). Promote to
      # blocking once that error is fixed or the v4 chrome is deleted.
      - name: svelte-check (advisory)
        continue-on-error: true
        run: pnpm --dir web check

      # Blocking: 16 of the 17 node:test unit suites (190 tests).
      # cm-decorations.test.mjs is excluded — cm-decorations.ts uses
      # extensionless bundler-style imports (./code-highlight) that node's
      # ESM loader can't resolve, so that one suite needs a bundler-aware
      # runner (tsx/vite-node) before it can run here.
      #
      # TODO(e2e): the Playwright e2e suites in web/tests/ —
      # property-readmodel.e2e.mjs, tag-redesign.e2e.mjs,
      # task-tokens-nlp.e2e.mjs, vim-counts.e2e.mjs, vim-registers.e2e.mjs,
      # vim-undo.e2e.mjs — need a built web bundle + a static-serving
      # tesela-server on :7788 with a fixtures mosaic and use human-paced
      # timing waits. Wire them up as a separate non-blocking job once the
      # A12 cross-process convergence harness (the priority gate) lands.
      - name: Unit tests
        run: |
          cd web
          node --experimental-transform-types --test \
            $(ls tests/unit/*.test.mjs | grep -v cm-decorations)

  worker-conformance:
    name: Relay conformance (Cloudflare Worker via wrangler dev)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-conformance-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cloudflare-relay/package-lock.json

      - name: Install worker dependencies
        run: npm ci --prefix cloudflare-relay

      # wrangler dev reads local-only secrets from .dev.vars (gitignored).
      # This well-known token matches the conformance suite's default
      # (TESELA_RELAY_CONFORMANCE_ADMIN_TOKEN fallback) so the admin-recovery
      # test passes. It is never deployed anywhere.
      - name: Write .dev.vars for wrangler dev
        run: printf 'TESELA_RELAY_ADMIN_TOKEN=test-admin-token-please-rotate\n' > cloudflare-relay/.dev.vars

      # Plain `wrangler dev` is all the DO-SQLite local emulation needs
      # (state lands in .wrangler/state/v3/do/ — same as the documented
      # local-dev flow in cloudflare-relay/README.md).
      - name: Start wrangler dev
        run: |
          cd cloudflare-relay
          npx wrangler dev --port 8787 > /tmp/wrangler-dev.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://127.0.0.1:8787/; then
              echo "wrangler dev is up"
              exit 0
            fi
            sleep 1
          done
          echo "wrangler dev never came up; log follows:" >&2
          cat /tmp/wrangler-dev.log >&2
          exit 1

      - name: Run conformance suite against the Worker
        env:
          TESELA_RELAY_CONFORMANCE_URL: http://127.0.0.1:8787
        run: cargo test -p tesela-relay --test conformance

      - name: Dump wrangler dev log on failure
        if: failure()
        run: cat /tmp/wrangler-dev.log || true

  notify-failure:
    name: File failure issue (main only)
    runs-on: ubuntu-latest
    needs: [rust, web, worker-conformance]
    if: failure() && github.event_name == 'push'
    permissions:
      issues: write
    steps:
      - name: Create or refresh the CI-failure issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="CI failing on main"
          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          body="CI failed on main: $run_url (commit $GITHUB_SHA)"
          num="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search "\"$title\" in:title" --json number --jq '.[0].number // empty')"
          if [ -n "$num" ]; then
            gh issue comment "$num" --repo "$GITHUB_REPOSITORY" --body "$body"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "$body"
          fi
