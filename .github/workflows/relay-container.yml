name: tesela-relay container

# Builds + pushes the multi-arch HA-addon image to ghcr.io. Mirrors
# the schedule-studio container pipeline: build with buildx + QEMU,
# tag as both `latest` and the version pulled from the addon's
# config.yaml, push to ghcr.io. The HA addon config references this
# image via `image: ghcr.io/taylorfinklea/tesela-relay`.
#
# Security note: this workflow uses only built-in safe context vars
# (github.actor, github.repository, github.sha, secrets.GITHUB_TOKEN).
# No untrusted user input (PR title, commit message, issue body) is
# interpolated into `run:` shells.

on:
  push:
    branches: [main]
    paths:
      - "crates/tesela-relay/**"
      - "crates/tesela-sync/**"
      - "crates/tesela-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "home-assistant/tesela-relay/**"
      - ".github/workflows/relay-container.yml"
    tags: ["relay-v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  issues: write

env:
  IMAGE_NAME: ghcr.io/taylorfinklea/tesela-relay

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: version
        run: |
          version="$(awk -F\" '/^version:/ {print $2; exit}' home-assistant/tesela-relay/config.yaml)"
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: home-assistant/tesela-relay/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
            BUILD_NAME=Tesela Sync Relay
            BUILD_DESCRIPTION=Zero-knowledge sync relay for Tesela notes.
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_REF=${{ github.sha }}

      # Failure alerting: this pipeline was dark-red 2026-05-29 → 06-08 and
      # nobody noticed until the HA add-on 404'd on the missing GHCR image.
      # On failure, file (or refresh) a GitHub issue so red is visible
      # outside the Actions tab. Only built-in safe env vars — no untrusted
      # input reaches the shell.
      - name: Create or refresh the failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="relay-container build failing on main"
          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          body="relay-container failed: $run_url (commit $GITHUB_SHA)"
          num="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search "\"$title\" in:title" --json number --jq '.[0].number // empty')"
          if [ -n "$num" ]; then
            gh issue comment "$num" --repo "$GITHUB_REPOSITORY" --body "$body"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "$body"
          fi
