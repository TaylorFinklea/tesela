name: "Tesela Sync Relay"
version: "0.1.0"
slug: "tesela_relay"
description: >-
  Zero-knowledge sync relay for Tesela notes. Acts as a store-and-
  forward deposit box between your devices; can never read your data.
url: "https://github.com/tfinklea/tesela/tree/main/crates/tesela-relay"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
init: false
hassio_api: false
homeassistant_api: false
# Map persistent storage so the relay's SQLite + nonce cache survive
# addon updates. Home Assistant mounts `/data` to a per-addon
# persistent volume automatically; the `data:rw` map here makes the
# `/data` path inside the container writable.
map:
  - "data:rw"
# Default port mapping — exposes the relay on host port 8484. Users
# typically front this with a reverse proxy (Nginx Proxy Manager,
# Caddy, the built-in Home Assistant Cloudflare addon) so external
# devices hit it over HTTPS rather than raw 8484.
ports:
  8484/tcp: 8484
ports_description:
  8484/tcp: "Relay HTTP API (front with TLS reverse proxy for WAN access)"
# User-editable options surfaced in the Home Assistant addon UI.
# Defaults make the addon work out of the box once the user pastes
# in an admin token.
options:
  admin_token: ""
  max_body: 5242880
  log_level: "info"
schema:
  # The admin token is the only secret. Used by the operator to call
  # `DELETE /admin/registration/:group_id` for hijack recovery. Anything
  # client-bound (group key, auth key) never touches the relay.
  admin_token: "password"
  # Hard ceiling on a single PUT envelope body in bytes. The protocol
  # caps ops batches at ~1 MB, so the 5 MB default is comfortable
  # headroom. Tighten if you want a stricter DoS guard.
  max_body: "int(1024,)"
  log_level: "list(trace|debug|info|warn|error)"
