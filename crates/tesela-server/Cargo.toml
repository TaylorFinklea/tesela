[package]
name = "tesela-server"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "tesela-server"
path = "src/main.rs"

[dependencies]
tesela-core = { path = "../tesela-core" }
tesela-backup = { path = "../tesela-backup" }
tempfile = { workspace = true }
axum = { workspace = true }
tower-http = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
chrono.workspace = true
regex.workspace = true

# Phase 12.1 — Apple Reminders bidirectional sync. EventKit is a macOS/iOS
# framework, so the FFI is gated behind cfg(target_os = "macos"). Linux/
# Windows builds compile a no-op stub that returns "unsupported platform"
# from the sync endpoint.
[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-foundation = { version = "0.3", features = [
    "NSArray",
    "NSCalendar",
    "NSDate",
    "NSError",
    "NSObject",
    "NSPredicate",
    "NSString",
    "NSUUID",
] }
objc2-event-kit = { version = "0.3", features = [
    "EKAlarm",
    "EKCalendar",
    "EKCalendarItem",
    "EKEventStore",
    "EKObject",
    "EKRecurrenceDayOfWeek",
    "EKRecurrenceRule",
    "EKReminder",
    "EKTypes",
] }
block2 = "0.6"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = { workspace = true }
serde_json = { workspace = true }
criterion = { workspace = true }
reqwest = { workspace = true }
tesela-fixtures = { path = "../tesela-fixtures" }

[[bench]]
name = "http"
harness = false
